<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web DAW Layout</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="daw-header">
    <div class="brand">Web DAW</div>
    <nav>
      <a href="index.html">Menu</a>
      <a href="#">Save</a>
      <a href="#">Help</a>
    </nav>
  </header>

  <section class="transport-panel">
    <button id="play-button" class="transport-button">Play</button>
    <button id="pause-button" class="transport-button">Pause</button>
    <button id="stop-button" class="transport-button">Stop</button>
    <button id="record-button" class="transport-button">Record</button>
    <label class="bpm-control">
      BPM
      <input id="bpm-input" type="number" min="40" max="240" step="1" value="120" />
    </label>
    <div class="transport-item">Time: <strong id="time-display">0:00</strong></div>
  </section>

  <main class="daw-layout">
    <aside class="audio-browser-panel resizable-panel" id="audio-browser-panel">
      <div class="panel-header browser-header">
        <div>
          <h2>Audio Browser</h2>
          <p>Drag files to the playlist</p>
        </div>
      </div>
      <div class="panel-body browser-body">
        <button id="insert-file-button" class="panel-button">Insert Files</button>
        <input id="file-input" type="file" accept="audio/*" multiple hidden />
        <div id="drop-area" class="drop-area">Drag and drop audio files here</div>
        <div class="audio-library" id="audio-library"></div>
      </div>
    </aside>

    <div id="browser-resizer" class="splitter splitter-vertical"></div>

    <div class="workspace-panel" id="workspace-panel">
      <section class="playlist-panel resizable-panel" id="playlist-panel">
        <div class="panel-header playlist-header">
          <div>
            <h2>Playlist</h2>
            <p>Arrange your clips</p>
          </div>
          <button id="add-track-button" class="panel-button small">Add Track</button>
        </div>
        <div class="panel-body playlist-body">
          <div id="timeline-container" class="timeline-container"></div>
        </div>
      </section>

      <div id="playlist-resizer" class="splitter splitter-horizontal"></div>

      <section class="piano-roll-panel resizable-panel" id="piano-roll-panel">
        <div class="panel-header">
          <div>
            <h2>Piano Roll</h2>
            <p>Click to add notes</p>
          </div>
          <button id="instruments-button" class="panel-button small">Instruments</button>
        </div>
        <div class="panel-body piano-roll-body">
          <div id="piano-roll-container" class="piano-roll-container"></div>
        </div>
      </section>
    </div>

    <div id="workspace-resizer" class="splitter splitter-vertical"></div>

    <aside class="mixer-panel resizable-panel" id="mixer-panel">
      <div class="panel-header mixer-header">
        <div>
          <h2>Mixer</h2>
          <p>Interactive channel strips</p>
        </div>
      </div>
      <div class="panel-body mixer-body">
        <div id="mixer-channels" class="mixer-channels"></div>
      </div>
    </aside>
  </main>

  <div class="modal hidden" id="instrument-modal" role="dialog" aria-modal="true" aria-labelledby="instrument-modal-title">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="instrument-modal-title">Instrument Settings</h2>
        <button id="instrument-close-button" class="modal-close" aria-label="Close">×</button>
      </div>
      <div class="modal-field">
        <label for="instrument-track-select">Track</label>
        <select id="instrument-track-select"></select>
      </div>
      <div class="modal-field">
        <label for="instrument-type">Instrument</label>
        <select id="instrument-type">
          <option value="Keyboard">Keyboard</option>
          <option value="Drums">Drums</option>
        </select>
      </div>
      <div class="modal-field">
        <label for="pitch-input">Pitch</label>
        <input id="pitch-input" type="text" value="C4" />
      </div>
      <div class="modal-field">
        <label for="range-input">Range</label>
        <input id="range-input" type="text" value="2 octaves" />
      </div>
      <div id="keyboard-container" class="keyboard-container hidden">
        <!-- Keyboard will be rendered here -->
      </div>
      <div class="modal-actions">
        <button id="instrument-save-button" class="panel-button">Save</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
